<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Quiz 5ª Party 💖✨</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Baloo 2',cursive;
background:linear-gradient(135deg,#ffb3ec,#c8e7ff,#fcd6ff);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
}
.container{
background:white;
width:100%;
max-width:650px;
border-radius:25px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}
h1{font-size:30px;color:#ff1493;margin-bottom:15px;}
.question{font-size:24px;margin-bottom:20px;color:#6a1b9a;}
.option{
margin:12px 0;
padding:18px;
border-radius:18px;
background:#ffe6fa;
font-size:22px;
cursor:pointer;
transition:0.3s;
}
.option:active{transform:scale(0.95);}
.message{margin-top:15px;font-size:20px;min-height:30px;}
.progress{height:10px;background:#eee;border-radius:10px;overflow:hidden;margin-bottom:20px;}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#ff69b4,#87cefa);transition:0.3s;}
</style>
</head>

{q:"200 : 20?",c:"10",a:"20",w:"5",f:"Arcobaleno 10"}

/* Totale 100 domande */

];

function shuffle(a){return a.sort(()=>Math.random()-0.5);}
shuffle(questions);

let current=0;
let score=0;

const quiz=document.getElementById("quiz");
const progressBar=document.getElementById("progressBar");
const message=document.getElementById("message");

function loadQuestion(){
let q=questions[current];
quiz.innerHTML=`<div class="question">Domanda ${current+1}: ${q.q}</div>`+
shuffle([
{text:q.c,correct:true},
{text:q.a,correct:false},
{text:q.w,correct:false},
{text:q.f,correct:false}
]).map((opt,i)=>
`<div class="option" onclick="selectOption(${i})">${opt.text}</div>`
).join("");
progressBar.style.width=((current/questions.length)*100)+"%";
message.innerHTML="";
}

function selectOption(index){
let opts=document.querySelectorAll(".option");
let currentOptions=shuffle([
{text:questions[current].c,correct:true},
{text:questions[current].a,correct:false},
{text:questions[current].w,correct:false},
{text:questions[current].f,correct:false}
]);
if(currentOptions[index].correct){
document.getElementById("correctSound").play();
message.innerHTML="🎉 Bravissimaaa!";
score++;
current++;
setTimeout(()=>{
if(current<questions.length){
loadQuestion();
}else{
quiz.innerHTML=`<div class="question">Hai finito! Punteggio: ${score}/100 💖</div>`;
progressBar.style.width="100%";
}
},600);
}else{
document.getElementById("wrongSound").play();
message.innerHTML="❌ Quaaa-puaaa 😜 Riprova!";
}
}

loadQuestion();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Party Mobile 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Baloo 2',cursive;
background:linear-gradient(135deg,#ffb3ec,#c8e7ff,#fcd6ff);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
}

.container{
background:white;
width:100%;
max-width:600px;
border-radius:25px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h1{
font-size:32px;
color:#ff1493;
margin-bottom:15px;
}

.question{
font-size:24px;
margin-bottom:20px;
color:#6a1b9a;
}

.option{
margin:12px 0;
padding:18px;
border-radius:18px;
background:#ffe6fa;
font-size:22px;
cursor:pointer;
transition:0.3s;
}

.option:active{
transform:scale(0.97);
}

.message{
margin-top:15px;
font-size:20px;
min-height:30px;
}

.progress{
height:10px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff69b4,#87cefa);
transition:0.3s;
}
</style>
</head>

<body>
<div class="container">
<h1>Quiz Super Amiche 💖✨</h1>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div id="quiz"></div>
<div class="message" id="message"></div>

</div>

<!-- SUONI -->
<audio id="correctSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9c6e08.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/audio/2022/10/16/audio_7f51fef9d5.mp3"></audio>

<script>

const baseQuestions = [
{q:"Quanto fa 8 x 7?",c:"56",a:"54",w:"64",f:"Magia glitter ✨"},
{q:"Capitale Italia?",c:"Roma",a:"Milano",w:"Parigi",f:"Hogwarts"},
{q:"In Toy Story il cowboy è?",c:"Woody",a:"Jessie",w:"Buzz",f:"Ron cowboy"},
{q:"12 : 3 fa?",c:"4",a:"3",w:"6",f:"Unicorno 🦄"},
{q:"Capitale Francia?",c:"Parigi",a:"Lione",w:"Madrid",f:"Castello rosa"}
];

while(baseQuestions.length<100){
baseQuestions.push(baseQuestions[Math.floor(Math.random()*5)]);
}

function shuffle(array){
return array.sort(()=>Math.random()-0.5);
}

const quizData=baseQuestions.map((q,i)=>({
question:`Domanda ${i+1}: ${q.q}`,
options:shuffle([
{text:q.c,correct:true},
{text:q.a,correct:false},
{text:q.w,correct:false},
{text:q.f,correct:false}
])
}));

let current=0;
let score=0;

const quiz=document.getElementById("quiz");
const progressBar=document.getElementById("progressBar");
const message=document.getElementById("message");

function loadQuestion(){
let q=quizData[current];
quiz.innerHTML=`<div class="question">${q.question}</div>`+
q.options.map((opt,i)=>
`<div class="option" onclick="selectOption(${i})">${opt.text}</div>`
).join("");
progressBar.style.width=((current/quizData.length)*100)+"%";
message.innerHTML="";
}

function selectOption(index){
if(quizData[current].options[index].correct){
document.getElementById("correctSound").play();
message.innerHTML="🎉 Bravissimaaa!";
message.style.color="green";
score++;
current++;
setTimeout(()=>{
if(current<quizData.length){
loadQuestion();
}else{
showResult();
}
},700);
}else{
document.getElementById("wrongSound").play();
message.innerHTML="❌ Quaaa-puaaa 😜 Riprova!";
message.style.color="red";
}
}

function showResult(){
quiz.innerHTML="";
progressBar.style.width="100%";
let percent=Math.round((score/quizData.length)*100);
let finale="";

if(percent>=85){
finale="👑 Regina del Party!";
}else if(percent>=60){
finale="🌟 Super preparata!";
}else{
finale="😆 L'importante è divertirsi!";
}

quiz.innerHTML=`<div class="question">Punteggio finale: ${percent}%</div>
<div style="font-size:28px;color:#ff1493;margin-top:20px;">${finale}</div>`;
message.innerHTML="";
}

loadQuestion();

</script>
</body>
</html>
